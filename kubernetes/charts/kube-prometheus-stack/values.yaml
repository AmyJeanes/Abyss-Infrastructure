kube-prometheus-stack:
  crds:
    enabled: true
    upgradeJob:
      enabled: true
      forceConflicts: true
  prometheus-node-exporter:
    affinity:
      nodeAffinity:
        requiredDuringSchedulingIgnoredDuringExecution:
          nodeSelectorTerms:
          - matchExpressions:
            - key: type
              operator: NotIn
              values:
              - virtual-kubelet
  alertmanager:
    alertmanagerSpec:
      storage:
        volumeClaimTemplate:
          spec:
            volumeName: alertmanager
            resources:
              requests:
                storage: 512Mi
            accessModes:
            - ReadWriteOnce
            storageClassName: local-storage
    config:
      route:
        receiver: pagerduty
        routes:
        - matchers:
          - alertname = Watchdog
          receiver: deadmanssnitch
          repeat_interval: 15m
        - matchers:
          - alertname = InfoInhibitor
          receiver: "null"
      receivers:
      - name: pagerduty
      - name: deadmanssnitch
        webhook_configs:
        - send_resolved: false
      - name: "null"
      inhibit_rules:
      - equal:
        - namespace
        - alertname
        source_matchers:
        - severity = critical
        target_matchers:
        - severity =~ warning|info
      - equal:
        - namespace
        - alertname
        source_matchers:
        - severity = warning
        target_matchers:
        - severity = info
      - equal:
        - namespace
        source_matchers:
        - alertname = InfoInhibitor
        target_matchers:
        - severity = info
  grafana:
    persistence:
      enabled: true
      type: pvc
      existingClaim: grafana
    resources:
      requests:
        cpu: 50m
        memory: 300Mi
      limits:
        memory: 300Mi
    sidecar:
      dashboards:
        enabled: true
        searchNamespace: ALL
      datasources:
        enabled: true
        searchNamespace: ALL
    ingress:
      enabled: true
      ingressClassName: nginx
      tls:
      - secretName: grafana-tls
    env:
      GF_PLUGINS_ALLOW_LOADING_UNSIGNED_PLUGINS: panodata-map-panel
  prometheus:
    prometheusSpec:
      resources:
        requests:
          cpu: 50m
          memory: 800Mi
        limits:
          memory: 800Mi
      storageSpec:
        volumeClaimTemplate:
          spec:
            volumeName: prometheus
            resources:
              requests:
                storage: 10Gi
            accessModes:
            - ReadWriteOnce
            storageClassName: local-storage
      retention: 7d
      ruleSelectorNilUsesHelmValues: false
      serviceMonitorSelectorNilUsesHelmValues: false
      podMonitorSelectorNilUsesHelmValues: false
      probeSelectorNilUsesHelmValues: false
  prometheusOperator:
    prometheusConfigReloader:
      resources:
        requests:
          cpu: 5m
          memory: 40Mi
        limits:
          cpu: "0"
          memory: 40Mi
  kubeScheduler:
    enabled: false
  kubeControllerManager:
    enabled: false
  kubeProxy:
    enabled: false
  defaultRules:
    disabled:
      TargetDown: true
      KubeAggregatedAPIErrors: true
  additionalPrometheusRulesMap:
    custom-rules:
      groups:
      - name: custom.rules
        rules:
        - alert: CPUUsageHigh
          annotations:
            description: '{{ $value | humanizePercentage }} CPU usage relative to requests in namespace {{ $labels.namespace }} for container {{ $labels.container }} in pod {{ $labels.pod }}.'
            summary: Container experienced elevated CPU usage relative to requests
          expr: |-
            sum(node_namespace_pod_container:container_cpu_usage_seconds_total:sum_irate) by (namespace, pod, container)
              /
            (sum(kube_pod_container_resource_requests{resource="cpu", unit="core"}) by (namespace, pod, container))
              > ( 150 / 100 )
          for: 15m
          labels:
            severity: warning
        - alert: MemoryUsageHigh
          annotations:
            description: '{{ $value | humanizePercentage }} memory usage relative to requests in namespace {{ $labels.namespace }} for container {{ $labels.container }} in pod {{ $labels.pod }}.'
            summary: Container experienced elevated memory usage relative to requests
          expr: |-
            sum(node_namespace_pod_container:container_memory_working_set_bytes{namespace != "kube-system"}) by (namespace, pod, container)
              /
            (sum(kube_pod_container_resource_requests{namespace != "kube-system", resource="memory", unit="byte"}) by (namespace, pod, container))
              > ( 125 / 100 )
          for: 15m
          labels:
            severity: warning
      - name: adguardsync.rules
        rules:
        - alert: AdGuardSyncFailed
          annotations:
            description: '{{ $labels.instance }} has not reported a successful AdGuard sync in the past 10 minutes or the sync failed.'
            summary: AdGuard sync failed or metric missing
          expr: |-
            absent_over_time(adguard_home_sync_sync_successful[10m]) or (adguard_home_sync_sync_successful == 0)
          for: 1m
          labels:
            severity: critical
        - alert: AdGuardSyncSlow
          annotations:
            description: 'AdGuard sync on {{ $labels.instance }} has taken longer than 5 seconds consistently for 5 minutes.'
            summary: AdGuard sync is slow
          expr: |-
            adguard_home_sync_sync_duration_seconds > 5 and on(instance) adguard_home_sync_sync_successful
          for: 5m
          labels:
            severity: warning
      - name: backup.rules
        rules:
        - alert: ResticBackupMissing
          annotations:
            summary: No recent successful restic backup
            description: The restic-backup CronJob has not completed a successful backup in over 26h. Check the CronJob in the default namespace.
          expr: (kube_cronjob_status_last_successful_time{namespace="default", cronjob="restic-backup"} > 0) and ((time() - kube_cronjob_status_last_successful_time{namespace="default", cronjob="restic-backup"}) > 93600)
          for: 1h
          labels:
            severity: critical
        - alert: ResticBackupJobFailed
          annotations:
            summary: A restic backup job failed
            description: 'restic backup job {{ $labels.job_name }} is in a Failed state.'
          expr: kube_job_failed{namespace="default", job_name=~"restic-backup-.*", condition="true"} > 0 and on(job_name) (kube_job_status_start_time{namespace="default"} > (time() - 93600))
          for: 15m
          labels:
            severity: warning
  kube-state-metrics:
    resources:
      requests:
        cpu: 5m
        memory: 100Mi
      limits:
        memory: 100Mi