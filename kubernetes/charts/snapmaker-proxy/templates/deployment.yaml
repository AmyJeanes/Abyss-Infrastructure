apiVersion: apps/v1
kind: Deployment
metadata:
  name: snapmaker-proxy
spec:
  replicas: 1
  selector:
    matchLabels:
      app: snapmaker-proxy
  template:
    metadata:
      labels:
        app: snapmaker-proxy
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
    spec:
      containers:
      - name: caddy
        image: caddy:2.11.4@sha256:cb9d71ad83182011b79355cd57692686374bd78d6fe327efe0ff8507da03ab13
        volumeMounts:
        - name: caddy-config
          mountPath: /etc/caddy/Caddyfile
          subPath: Caddyfile
      volumes:
      - name: caddy-config
        configMap:
          name: snapmaker-proxy-config