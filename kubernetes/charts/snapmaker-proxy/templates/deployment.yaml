apiVersion: apps/v1
kind: Deployment
metadata:
  name: snapmaker-proxy
spec:
  replicas: 1
  selector:
    matchLabels:
      app: snapmaker-proxy
  template:
    metadata:
      labels:
        app: snapmaker-proxy
    spec:
      containers:
      - name: caddy
        image: caddy:latest
        volumeMounts:
        - name: caddy-config
          mountPath: /etc/caddy/Caddyfile
          subPath: Caddyfile
      volumes:
      - name: caddy-config
        configMap:
          name: snapmaker-proxy-config