apiVersion: v1
kind: PersistentVolume
metadata:
  name: {{ required "name is required" .Values.name }}
spec:
  accessModes:
  - ReadWriteOnce
  capacity:
    storage: {{ required "disk.capacity is required" .Values.disk.capacity }}
  csi:
    driver: driver.longhorn.io
    fsType: ext4
    volumeHandle: {{ required "volumeHandle is required" .Values.volumeHandle }}
    {{- if eq .Values.dataEngine "v2" }}
    volumeAttributes:
      dataEngine: v2
    {{- end }}
  persistentVolumeReclaimPolicy: Retain
  storageClassName: {{ if eq .Values.dataEngine "v2" }}longhorn-v2{{ else }}longhorn{{ end }}
