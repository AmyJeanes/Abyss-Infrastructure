apiVersion: apps/v1
kind: Deployment
metadata:
  name: qbittorrent
spec:
  replicas: {{ .Values.replicas }}
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: qbittorrent
  template:
    metadata:
      annotations:
        checksum/secret: {{ include (print $.Template.BasePath "/secret.yaml") . | sha256sum }}
      labels:
        app: qbittorrent
    spec:
      initContainers:
        # Guard: refuse to start (and silently bind the empty root-disk placeholder)
        # until the external drive is actually mounted. The .mounted sentinel lives
        # ONLY on /dev/sdb1, so its absence means /mnt/das is unmounted.
        - name: wait-for-das
          image: {{ .Values.initContainer.image.repository }}:{{ .Values.initContainer.image.tag }}
          imagePullPolicy: {{ .Values.initContainer.image.pullPolicy }}
          command:
          - /bin/sh
          - -c
          - |
            echo "Waiting for external drive at /mnt/das (sentinel .mounted)..."
            until [ -f /das/.mounted ]; do sleep 5; done
            echo "External drive is mounted; starting qBittorrent."
          volumeMounts:
          - mountPath: /das
            name: das-root
            readOnly: true
            # so a remount on the host while we wait propagates in (self-heals)
            mountPropagation: HostToContainer
        - args:
          - |
            wget https://github.com/bill-ahmed/qbit-matUI/releases/download/v1.16.4/qbit-matUI_Unix_1.16.4.zip -O /tmp/altui.zip
            rm -rf /vuetorrent/*
            mkdir /tmp/altui
            unzip /tmp/altui.zip -d /tmp/altui
            mv /tmp/altui/qbit-matUI_Unix_1.16.4/* /vuetorrent
          command:
          - /bin/sh
          - -c
          image: {{ .Values.initContainer.image.repository }}:{{ .Values.initContainer.image.tag }}
          imagePullPolicy: {{ .Values.initContainer.image.pullPolicy }}
          name: init
          volumeMounts:
          - mountPath: /vuetorrent
            name: vuetorrent
      containers:
        - name: qbittorrent
          image: {{ .Values.image.repository }}:{{ .Values.image.tag }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            - /bin/sh
          args:
            - -c
            {{- if .Values.vpn.enabled }}
            - while ! ip link show tun0 &>/dev/null; do sleep 1; done && /init
            {{- else }}
            - /init
            {{- end }}
          env:
            - name: PUID
              value: "{{ .Values.puid }}"
            - name: PGID
              value: "{{ .Values.pgid }}"
            - name: TZ
              value: Europe/London
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          volumeMounts:
            - name: config
              mountPath: /config
            - name: downloads
              mountPath: /downloads
            - name: vuetorrent
              mountPath: /vuetorrent
          livenessProbe:
            failureThreshold: 3
            initialDelaySeconds: 0
            periodSeconds: 10
            tcpSocket:
              port: 8080
            timeoutSeconds: 1
          readinessProbe:
            failureThreshold: 3
            initialDelaySeconds: 0
            periodSeconds: 10
            tcpSocket:
              port: 8080
            timeoutSeconds: 1
          startupProbe:
            failureThreshold: 30
            initialDelaySeconds: 0
            periodSeconds: 5
            tcpSocket:
              port: 8080
            timeoutSeconds: 1
          resources: {{ toYaml .Values.resources | nindent 12 }}
        {{- if .Values.vpn.enabled }}
        - name: gluetun
          image: {{ .Values.gluetun.image.repository }}:{{ .Values.gluetun.image.tag }}
          imagePullPolicy: IfNotPresent
          env:
          - name: FIREWALL_INPUT_PORTS
            value: "8080"
          - name: OPENVPN_USER
            valueFrom:
              secretKeyRef:
                name: qbittorrent
                key: openvpn-user
          - name: SERVER_CITIES
            value: amsterdam
          - name: TZ
            value: Europe/London
          - name: VPN_SERVICE_PROVIDER
            value: mullvad
          - name: VPN_TYPE
            value: openvpn
          livenessProbe:
            exec:
              command:
              - /gluetun-entrypoint
              - healthcheck
            failureThreshold: 6
            initialDelaySeconds: 30
            periodSeconds: 5
            timeoutSeconds: 5
          securityContext:
            capabilities:
              add:
              - NET_ADMIN
              - SYS_MODULE
        {{- end }}
      volumes:
        - name: das-root
          hostPath:
            path: /mnt/das
            type: Directory
        - name: config
          persistentVolumeClaim:
            claimName: qbittorrent-config
        - name: downloads
          hostPath:
            path: {{ .Values.downloads.hostPath }}
            type: DirectoryOrCreate
        - name: vuetorrent
          emptyDir:
            {}