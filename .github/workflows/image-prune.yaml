name: Image Prune

on:
  workflow_dispatch:
  workflow_call:
  push:
    branches: [main]
    paths:
      - 'kubernetes/charts/image-prune/**'
      - '.github/workflows/image-prune.yaml'

jobs:
  deploy-image-prune:
    name: Deploy Image Prune
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - name: Connect to Kubernetes
        uses: ./.github/actions/connect-k8s
        with:
          kubeconfig: "${{ secrets.KUBECONFIG }}"
          hostname: kubernetes-api.${{ vars.HOST }}
          serviceTokenId: ${{ vars.CLOUDFLARE_TUNNEL_SERVICE_TOKEN_ID }}
          serviceTokenSecret: ${{ secrets.CLOUDFLARE_TUNNEL_SERVICE_TOKEN_SECRET }}

      - name: Install image-prune
        run: |
          helm upgrade --install --wait --atomic --debug \
            image-prune . \
            --namespace kube-system \
            -f values.yaml
        working-directory: kubernetes/charts/image-prune

      - name: Disconnect from Kubernetes
        if: always()
        uses: ./.github/actions/disconnect-k8s
